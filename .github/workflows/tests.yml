name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: nullvault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx email-validator python-multipart bcrypt==4.0.1

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nullvault_test
          SECRET_KEY: testsecretkey1234567890abcdef
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: pytest tests/ -v
